<!-- GitHub Stats Component -->
<!-- Usage: {% include github-stats.html %} -->

{% if site.author.github %}
<div class="section-title">GitHub Statistics</div>

<div class="github-stats">
  <img class="github-stats-img" src="https://github-readme-stats.vercel.app/api?username={{ site.author.github }}&show_icons=true&theme=default&hide_border=true&bg_color=ffffff&title_color=2563eb&icon_color=2563eb&text_color=1e293b" alt="GitHub Stats" loading="lazy" />
  <img class="github-stats-img" src="https://github-readme-stats.vercel.app/api/top-langs/?username={{ site.author.github }}&layout=compact&hide_border=true&bg_color=ffffff&title_color=2563eb&text_color=1e293b" alt="Top Languages" loading="lazy" />
</div>
{% endif %}
